version: '3.8'

services:
  chatbot:
    build: .
    container_name: ongc_chatbot_app
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./docs:/app/docs
      - ./feedback.db:/app/feedback.db
    environment:
      - OLLAMA_API_BASE=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
